[package]
name = "splitwm"
version = "0.1.0"
edition = "2021"

[dependencies]
x11rb = { version = "0.13", features = ["xinput"] }
pixel-graphics = { path = "../pixel-graphics" }
pixel-fonts = { path = "../pixel-fonts" }
zune-jpeg = "0.5"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
