[package]
name = "splitwm"
version = "0.1.0"
edition = "2021"

[dependencies]
x11rb = { version = "0.13", features = ["xinput", "render", "shape", "shm"] }
# memfd_create/ftruncate/mmap for the MIT-SHM frame buffer shared with the X
# server (the fd itself is passed over the wire via ShmAttachFd).
libc = "0.2"
# Session-bus server for org.freedesktop.Notifications (the WM doubles as the
# notification daemon); binds the system libdbus, driven from its own thread.
dbus = "0.9"
# Chrome art is baked by build.rs; png-loading stays on for decoding user
# wallpaper PNGs at runtime.
pixel-graphics = { path = "../pixel-graphics" }
pixel-fonts = { path = "../pixel-fonts", default-features = false, features = ["baked"] }
zune-jpeg = "0.5"

[build-dependencies]
pixel-graphics = { path = "../pixel-graphics" }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
